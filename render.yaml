services:
  - type: web
    name: feedflow-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

  - type: web
    name: feedflow-worker
    env: docker
    rootDir: automation
    dockerfilePath: ./Dockerfile
    envVars:
      - key: WORKER_PORT
        value: 5000
      - key: TEST_MODE
        value: false
